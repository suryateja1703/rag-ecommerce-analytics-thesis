name: RAG Thesis CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.10"
  IMAGE_NAME: rag-thesis

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303 \
            --exclude=venv/
        continue-on-error: true

      - name: Check code formatting with black
        run: |
          black --check src/ tests/ --line-length=120
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v \
            --tb=short \
            --ignore=tests/test_pipeline.py
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            .pytest_cache/
            evaluation_results.csv
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      - name: Test Docker image
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY=test \
            ${{ env.IMAGE_NAME }}:latest \
            python -c "import streamlit; import chromadb; import anthropic; print('✅ Docker image OK!')"
        continue-on-error: true

      - name: Notify success
        run: |
          echo "✅ CI/CD Pipeline Complete!"
          echo "📦 Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "🚀 Ready for deployment!"